server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API requests to backend container
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy SignalR hub — requires WebSocket upgrade
    location /scoreboardhub {
        proxy_pass http://api:8080/scoreboardhub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Angular SPA — all unknown routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
