services:
  api:
    build:
      context: ./LowOnLegs
      dockerfile: LowOnLegs/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/LowOnLegsDb.db
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./LowOnLegs.React
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
